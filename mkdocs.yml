site_name: AdxLite Documentation
site_description: Local SQLite database with Kusto Query Language support
site_url: https://adxlite.github.io/adxlite/
repo_url: https://github.com/adxlite/adxlite
repo_name: adxlite/adxlite

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: guides/quickstart.md
      - Data Ingestion: guides/ingestion.md
      - Advanced Queries: guides/advanced-queries.md
  - Design:
      - Architecture: design/architecture.md
      - Design Decisions: design/decisions.md
      - Type System: design/type-system.md
      - Requirements: design/requirements.md
  - Reference:
      - KQL Syntax: reference/kql-syntax.md
      - Operators: reference/operators.md
      - Functions: reference/functions.md
      - Python API: reference/api.md
      - Limitations: reference/limitations.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/adxlite/adxlite
