name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'adxpandas/**'
      - 'adxlite/**'
  pull_request:
    branches: [main]
    paths:
      - 'adxpandas/**'
      - 'adxlite/**'
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./adxpandas[dev]"
          pip install -e "./adxlite[dev]"

      - name: Run adxpandas tests
        working-directory: adxpandas
        run: python -m pytest tests/ -v

      - name: Run adxlite tests
        working-directory: adxlite
        run: python -m pytest tests/ -v
